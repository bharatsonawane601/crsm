; Raise PHP limits so the admin panel can accept the ~16-20 MB CRMS installer.
; Hostinger (PHP-FPM) reads .user.ini per-directory; changes may take up to
; user_ini.cache_ttl seconds (default 300) to apply. Place this in public_html/api/.
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
