# Front door inside the crms compose stack. Two isolated entrances:
#   :80 — tailnet-only (tailscale serve, HTTPS 443): admin panel + everything.
#   :81 — PUBLIC (tailscale funnel, HTTPS 8443): ONLY the app-key-gated API
#         and installer downloads. The admin panel does not exist there.

# JSON compresses ~10:1 — the portal dashboard pull and the tombstone lists
# shrink from megabytes to kilobytes on station connections.
gzip on;
gzip_types application/json text/html;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_proxied any;
gzip_vary on;

server {
    listen 80;
    server_name _;

    # The Go API — /api/check.php -> api:8080/check.php.
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 64m;
    }

    # The admin panel, served by the same Go process. This port is reachable
    # only through tailnet-scoped `tailscale serve` (443) — it is never
    # funneled to the public internet.
    location /admin {
        client_max_body_size 512m;
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Installer downloads for the in-app updater.
    location /releases/ {
        alias /srv/releases/;
    }

    # Landing page.
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}

# Public entrance for the station apps (tailscale funnel :8443 -> here).
# API + installer downloads only; everything else is 404.
server {
    listen 81;
    server_name _;

    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 64m;
    }

    location /releases/ {
        alias /srv/releases/;
    }

    location / {
        return 404;
    }
}
