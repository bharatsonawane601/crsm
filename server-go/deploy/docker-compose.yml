# CRMS self-hosted stack (Proxmox VM). Lives at /opt/crms on the server.
# Secrets come from /opt/crms/.env (never committed).
services:
  postgres:
    image: postgres:17-alpine
    container_name: crms-postgres
    restart: always
    environment:
      POSTGRES_DB: crms
      POSTGRES_USER: crms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crms -d crms"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: crms-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  api:
    build: ./api
    container_name: crms-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://crms:${POSTGRES_PASSWORD}@postgres:5432/crms
      CRMS_APP_KEY: ${CRMS_APP_KEY}
      CRMS_GOOGLE_CLIENT_ID: ${CRMS_GOOGLE_CLIENT_ID}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Hostinger mirror (source of truth until cutover). Clear to go standalone.
      MIRROR_BASE_URL: ${MIRROR_BASE_URL}
      MIRROR_INTERVAL: ${MIRROR_INTERVAL:-5m}
      MIRROR_MODE: ${MIRROR_MODE:-full}
      RELEASE_URL_PREFIX: ${RELEASE_URL_PREFIX}
    volumes:
      - ./releases:/data/releases
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: crms-nginx
    restart: always
    ports:
      - "80:80"
      - "81:81"
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./releases:/srv/releases:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
